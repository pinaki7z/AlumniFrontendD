<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-io.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Alumnify by InsideOut – Built with Vite"
    />
    <link rel="apple-touch-icon" href="/logo-io.png" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <title>Alumnify By InsideOut</title>

    <style>
      /* width */
      ::-webkit-scrollbar {
        width: 6px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
        border-radius: 1px;
      }

      ::-webkit-scrollbar-thumb {
        background: #0b3a4e;
        border-radius: 1px;
        border: none;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(to bottom, #5fa080, #4d8a66);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
      }

      ::-webkit-scrollbar-corner {
        background: transparent;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
